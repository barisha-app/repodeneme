name: Build Plugins

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Repo indir
        uses: actions/checkout@v4

      - name: Java kur
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Gradle izin
        run: chmod +x ./gradlew

      - name: Plugin derle
        run: ./gradlew BenimPlugin:make

      - name: Build dosyalarını göster
        run: find . -type f -name "*.cs3"

      - name: Artifact yükle
        uses: actions/upload-artifact@v4
        with:
          name: benimplugin-build
          path: |
            **/*.cs3
