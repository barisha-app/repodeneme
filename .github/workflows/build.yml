name: Build Plugins

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Kodu indir
        uses: actions/checkout@v4

      - name: Java kur
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Gradle izin ver
        run: chmod +x ./gradlew

      - name: Plugin derle
        run: ./gradlew BenimPlugin:make

      - name: Derlenen dosyaları bul
        run: find . -type f \( -name "*.cs3" -o -name "plugins.json" \)

      - name: Build artifact yükle
        uses: actions/upload-artifact@v4
        with:
          name: benimplugin-build
          path: |
            **/*.cs3
            **/plugins.json
