name: Build Plugins

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Repo indir
        uses: actions/checkout@v4

      - name: Java kur
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Gradle izin
        run: chmod +x ./gradlew

      - name: Plugin derle
        run: ./gradlew Dramaizle:make

      - name: Build dosyalarını göster
        run: |
          find . -type f | grep -E '\.(cs3|zip|json)$' || true

      - name: Artifact yükle
        uses: actions/upload-artifact@v4
        with:
          name: dramaizle-build
          path: |
            **/*.cs3
            **/build/**/*.zip
            **/build/**/*.json
          if-no-files-found: warn
